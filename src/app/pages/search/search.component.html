<div class="form-card">
  <h2>Módulo de Consultas Legales</h2>
  <p class="subtitle">
    Ingrese el documento para verificar en las bases de datos oficiales.
  </p>

  <div class="form-group">
    <label>Número de Documento (Cédula)</label>
    <input
      type="text"
      [(ngModel)]="cedula"
      placeholder="Ej: 12345678"
      (keyup.enter)="consultarCedula()"
    />
  </div>

  <div class="button-group">
    <button
      class="btn-primary"
      (click)="consultarCedula()"
      [disabled]="cargando"
    >
      {{ cargando ? 'Buscando...' : 'Vigencia Cédula' }}
    </button>

    <button
      class="btn-secondary"
      (click)="consultarContador()"
      [disabled]="cargando"
    >
      {{ cargando ? 'Buscando...' : 'Verificar Contador' }}
    </button>
  </div>

  <div *ngIf="error" class="error-badge">
    <i class="icon-warning"></i> {{ error }}
  </div>

  <div *ngIf="resultado" class="result-card">
    <div class="result-header">
      <span class="badge">{{ resultado.fuente }}</span>
    </div>

    <div class="result-body">
      <div class="result-item">
        <span class="label">Estado:</span>
        <span class="value">{{ resultado.data?.vigencia }}</span>
      </div>
      <div class="result-item">
        <span class="label">Fecha consulta:</span>
        <span class="value">{{ resultado.data?.fecha }}</span>
      </div>
      <div class="result-item">
        <span class="label">Código:</span>
        <span class="value">{{ resultado.data?.codigo }}</span>
      </div>
    </div>
  </div>
</div>
